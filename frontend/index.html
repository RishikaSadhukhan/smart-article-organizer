<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Article Organizer — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="auth-page">
  <div class="auth-container fade-in">

    <div class="auth-logo">
      <div class="logo-icon">📚</div>
      <h1>Smart Article Organizer</h1>
      <p>Research paper management for students &amp; scholars</p>
    </div>

    <div class="auth-card">
      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login"    onclick="switchTab('login')">Sign In</button>
        <button class="auth-tab"        id="tab-register" onclick="switchTab('register')">Register</button>
      </div>

      <!-- LOGIN FORM -->
      <div id="form-login">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" id="login-email" class="form-control" placeholder="you@university.edu" />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" id="login-password" class="form-control" placeholder="••••••••" />
        </div>
        <div id="login-error" class="form-error hidden"></div>
        <button class="btn btn-primary btn-full btn-lg mt-3" id="login-btn" onclick="doLogin()">
          Sign In
        </button>
        <p style="text-align:center;margin-top:18px;font-size:13px;color:var(--text-secondary)">
          Don't have an account? <a href="#" onclick="switchTab('register')" style="color:var(--accent-light)">Register here</a>
        </p>
        <p style="text-align:center;margin-top:10px;font-size:12px;color:var(--text-muted)">
          Demo: demo@example.com / Demo@1234
        </p>
      </div>

      <!-- REGISTER FORM -->
      <div id="form-register" class="hidden">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Full Name <span class="required">*</span></label>
            <input type="text" id="reg-fullname" class="form-control" placeholder="Dr. Jane Smith" />
          </div>
          <div class="form-group">
            <label class="form-label">Username <span class="required">*</span></label>
            <input type="text" id="reg-username" class="form-control" placeholder="janesmith" />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Email Address <span class="required">*</span></label>
          <input type="email" id="reg-email" class="form-control" placeholder="you@university.edu" />
        </div>
        <div class="form-group">
          <label class="form-label">Institution</label>
          <input type="text" id="reg-institution" class="form-control" placeholder="State University" />
        </div>
        <div class="form-group">
          <label class="form-label">Password <span class="required">*</span></label>
          <input type="password" id="reg-password" class="form-control" placeholder="Min 6 characters" />
        </div>
        <div id="reg-error" class="form-error hidden"></div>
        <button class="btn btn-primary btn-full btn-lg mt-3" id="reg-btn" onclick="doRegister()">
          Create Account
        </button>
        <p style="text-align:center;margin-top:18px;font-size:13px;color:var(--text-secondary)">
          Already have an account? <a href="#" onclick="switchTab('login')" style="color:var(--accent-light)">Sign in</a>
        </p>
      </div>
    </div><!-- .auth-card -->

  </div>
</div>

<script src="/js/app.js"></script>
<script>
  // Redirect if already logged in
  (async () => {
    const r = await api.get('/auth/me');
    if (r.ok) window.location.href = '/pages/dashboard.html';
  })();

  function switchTab(tab) {
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
    document.getElementById('form-login').classList.toggle('hidden', tab !== 'login');
    document.getElementById('form-register').classList.toggle('hidden', tab !== 'register');
    document.getElementById('login-error').classList.add('hidden');
    document.getElementById('reg-error').classList.add('hidden');
  }

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const active = document.getElementById('tab-login').classList.contains('active');
    if (active) doLogin(); else doRegister();
  });

  async function doLogin() {
    const btn   = document.getElementById('login-btn');
    const errEl = document.getElementById('login-error');
    const email = document.getElementById('login-email').value.trim();
    const pass  = document.getElementById('login-password').value;

    if (!email || !pass) { showErr(errEl, 'Email and password are required.'); return; }

    setLoading(btn, true, 'Signing in…');
    errEl.classList.add('hidden');

    const r = await api.post('/auth/login', { email, password: pass });
    setLoading(btn, false);

    if (r.ok) {
      showToast('Welcome back!', 'success');
      window.location.href = '/pages/dashboard.html';
    } else {
      showErr(errEl, getErrors(r.data));
    }
  }

  async function doRegister() {
    const btn  = document.getElementById('reg-btn');
    const errEl = document.getElementById('reg-error');

    const body = {
      full_name:   document.getElementById('reg-fullname').value.trim(),
      username:    document.getElementById('reg-username').value.trim(),
      email:       document.getElementById('reg-email').value.trim(),
      institution: document.getElementById('reg-institution').value.trim(),
      password:    document.getElementById('reg-password').value
    };

    if (!body.full_name || !body.username || !body.email || !body.password) {
      showErr(errEl, 'All required fields must be filled.'); return;
    }

    setLoading(btn, true, 'Creating account…');
    errEl.classList.add('hidden');

    const r = await api.post('/auth/register', body);
    setLoading(btn, false);

    if (r.ok) {
      showToast('Account created! Welcome aboard.', 'success');
      window.location.href = '/pages/dashboard.html';
    } else {
      showErr(errEl, getErrors(r.data));
    }
  }

  function showErr(el, msg) {
    el.textContent = msg;
    el.classList.remove('hidden');
  }
</script>
</body>
</html>
