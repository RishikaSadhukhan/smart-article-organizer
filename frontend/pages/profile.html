<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — Smart Article Organizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="app-layout">
  <div id="sidebar-mount"></div>
  <div class="main-content">
    <div id="topbar-mount"></div>
    <div class="page fade-in">

      <div class="page-header">
        <div>
          <div class="page-title">👤 My Profile</div>
          <div class="page-subtitle">Manage your account information</div>
        </div>
      </div>

      <div class="two-col">

        <!-- Left: Profile info -->
        <div style="display:flex;flex-direction:column;gap:16px">

          <div class="card">
            <div class="card-header"><span class="card-title">Personal Information</span></div>
            <div class="card-body">

              <!-- Avatar -->
              <div style="text-align:center;margin-bottom:24px">
                <div class="profile-avatar-big" id="profile-avatar">?</div>
                <div style="font-size:13px;color:var(--text-secondary);margin-bottom:10px">Avatar color</div>
                <div class="color-picker-row" id="avatar-colors" style="justify-content:center">
                  <div class="color-swatch" data-color="#6366f1" style="background:#6366f1" onclick="pickAvatar(this,'#6366f1')"></div>
                  <div class="color-swatch" data-color="#8b5cf6" style="background:#8b5cf6" onclick="pickAvatar(this,'#8b5cf6')"></div>
                  <div class="color-swatch" data-color="#ec4899" style="background:#ec4899" onclick="pickAvatar(this,'#ec4899')"></div>
                  <div class="color-swatch" data-color="#14b8a6" style="background:#14b8a6" onclick="pickAvatar(this,'#14b8a6')"></div>
                  <div class="color-swatch" data-color="#f59e0b" style="background:#f59e0b" onclick="pickAvatar(this,'#f59e0b')"></div>
                  <div class="color-swatch" data-color="#10b981" style="background:#10b981" onclick="pickAvatar(this,'#10b981')"></div>
                  <div class="color-swatch" data-color="#3b82f6" style="background:#3b82f6" onclick="pickAvatar(this,'#3b82f6')"></div>
                  <div class="color-swatch" data-color="#ef4444" style="background:#ef4444" onclick="pickAvatar(this,'#ef4444')"></div>
                </div>
              </div>

              <div class="form-group">
                <label class="form-label">Full Name <span class="required">*</span></label>
                <input type="text" id="p-fullname" class="form-control" placeholder="Dr. Jane Smith" />
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label">Username</label>
                  <input type="text" id="p-username" class="form-control" disabled style="opacity:0.5" />
                  <div class="form-hint">Username cannot be changed</div>
                </div>
                <div class="form-group">
                  <label class="form-label">Email</label>
                  <input type="email" id="p-email" class="form-control" disabled style="opacity:0.5" />
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">Institution</label>
                <input type="text" id="p-institution" class="form-control" placeholder="State University" />
              </div>
              <div class="form-group">
                <label class="form-label">Bio</label>
                <textarea id="p-bio" class="form-control" rows="3" placeholder="A short bio about your research interests…"></textarea>
              </div>

              <div id="profile-error" class="form-error hidden"></div>
              <button class="btn btn-primary btn-full" id="save-profile-btn" onclick="saveProfile()">
                💾 Save Changes
              </button>
            </div>
          </div>

        </div>

        <!-- Right: Password + Stats -->
        <div style="display:flex;flex-direction:column;gap:16px">

          <div class="card">
            <div class="card-header"><span class="card-title">🔒 Change Password</span></div>
            <div class="card-body">
              <div class="form-group">
                <label class="form-label">Current Password</label>
                <input type="password" id="pw-current" class="form-control" placeholder="••••••••" />
              </div>
              <div class="form-group">
                <label class="form-label">New Password</label>
                <input type="password" id="pw-new" class="form-control" placeholder="Min 6 characters" />
              </div>
              <div class="form-group">
                <label class="form-label">Confirm New Password</label>
                <input type="password" id="pw-confirm" class="form-control" placeholder="Repeat new password" />
              </div>
              <div id="pw-error"   class="form-error hidden"></div>
              <div id="pw-success" class="hidden" style="font-size:13px;color:var(--success);margin-bottom:10px"></div>
              <button class="btn btn-secondary btn-full" id="change-pw-btn" onclick="changePassword()">
                🔑 Update Password
              </button>
            </div>
          </div>

          <div class="card" id="profile-stats-card">
            <div class="card-header"><span class="card-title">📊 My Library Stats</span></div>
            <div class="card-body" id="profile-stats">
              <div class="loading-screen" style="min-height:80px"><div class="spinner-ring"></div></div>
            </div>
          </div>

          <div class="card" style="border-color:rgba(239,68,68,0.25)">
            <div class="card-header"><span class="card-title" style="color:var(--danger)">⚠️ Danger Zone</span></div>
            <div class="card-body">
              <p style="font-size:13px;color:var(--text-secondary);margin-bottom:14px">
                Logging out ends your current session. Your data will be preserved.
              </p>
              <button class="btn btn-danger btn-full logout-btn">🚪 Logout</button>
            </div>
          </div>

        </div>

      </div>
    </div>
  </div>
</div>

<script src="/js/app.js"></script>
<script src="/js/sidebar.js"></script>
<script>
  renderSidebar('Profile', 'Your account settings');

  let selectedColor = '#6366f1';

  function pickAvatar(el, color) {
    selectedColor = color;
    document.getElementById('profile-avatar').style.background = color;
    document.querySelectorAll('#avatar-colors .color-swatch').forEach(s => s.classList.remove('active'));
    el.classList.add('active');
  }

  async function saveProfile() {
    const btn   = document.getElementById('save-profile-btn');
    const errEl = document.getElementById('profile-error');
    const full_name = document.getElementById('p-fullname').value.trim();

    if (!full_name) { errEl.textContent = 'Full name is required.'; errEl.classList.remove('hidden'); return; }

    setLoading(btn, true, 'Saving…');
    errEl.classList.add('hidden');

    const r = await api.put('/auth/profile', {
      full_name,
      institution:  document.getElementById('p-institution').value.trim(),
      bio:          document.getElementById('p-bio').value.trim(),
      avatar_color: selectedColor
    });

    setLoading(btn, false);
    if (r.ok) { showToast('Profile updated!', 'success'); }
    else { errEl.textContent = getErrors(r.data); errEl.classList.remove('hidden'); }
  }

  async function changePassword() {
    const btn     = document.getElementById('change-pw-btn');
    const errEl   = document.getElementById('pw-error');
    const succEl  = document.getElementById('pw-success');
    const current = document.getElementById('pw-current').value;
    const newPw   = document.getElementById('pw-new').value;
    const confirm = document.getElementById('pw-confirm').value;

    errEl.classList.add('hidden');
    succEl.classList.add('hidden');

    if (!current || !newPw || !confirm) { errEl.textContent = 'All fields are required.'; errEl.classList.remove('hidden'); return; }
    if (newPw !== confirm) { errEl.textContent = 'New passwords do not match.'; errEl.classList.remove('hidden'); return; }
    if (newPw.length < 6) { errEl.textContent = 'Password must be at least 6 characters.'; errEl.classList.remove('hidden'); return; }

    setLoading(btn, true, 'Updating…');

    const r = await api.put('/auth/change-password', { current_password: current, new_password: newPw });
    setLoading(btn, false);

    if (r.ok) {
      succEl.textContent = '✅ Password changed successfully.';
      succEl.classList.remove('hidden');
      document.getElementById('pw-current').value = '';
      document.getElementById('pw-new').value     = '';
      document.getElementById('pw-confirm').value = '';
    } else {
      errEl.textContent = getErrors(r.data);
      errEl.classList.remove('hidden');
    }
  }

  (async () => {
    const user = await initLayout();
    if (!user) return;

    document.getElementById('p-fullname').value    = user.full_name    || '';
    document.getElementById('p-username').value    = user.username     || '';
    document.getElementById('p-email').value       = user.email        || '';
    document.getElementById('p-institution').value = user.institution  || '';
    document.getElementById('p-bio').value         = user.bio          || '';

    const avatarEl = document.getElementById('profile-avatar');
    avatarEl.textContent   = (user.full_name || user.username || '?')[0].toUpperCase();
    avatarEl.style.background = user.avatar_color || '#6366f1';
    selectedColor = user.avatar_color || '#6366f1';

    document.querySelectorAll('#avatar-colors .color-swatch').forEach(s => {
      s.classList.toggle('active', s.dataset.color === selectedColor);
    });

    // Load stats
    const r = await api.get('/dashboard');
    if (r.ok) {
      const s = r.data.stats;
      document.getElementById('profile-stats').innerHTML = `
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          ${[
            { label:'Articles',   val: s.total_articles,   icon:'📄' },
            { label:'Categories', val: s.total_categories, icon:'🗂️' },
            { label:'Favorites',  val: s.total_favorites,  icon:'⭐' },
            { label:'With PDF',   val: s.total_with_pdf,   icon:'📎' }
          ].map(stat => `
            <div style="background:var(--bg-elevated);border-radius:var(--radius);padding:14px;text-align:center">
              <div style="font-size:22px;margin-bottom:4px">${stat.icon}</div>
              <div style="font-size:22px;font-weight:800;font-family:'Sora',sans-serif">${stat.val||0}</div>
              <div style="font-size:11px;color:var(--text-secondary)">${stat.label}</div>
            </div>`).join('')}
        </div>
        <div style="margin-top:14px;font-size:12px;color:var(--text-muted)">
          Member since ${formatDate(user.created_at || new Date())}
        </div>`;
    }
  })();
</script>
</body>
</html>
