<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Article — Smart Article Organizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="app-layout">
  <div id="sidebar-mount"></div>
  <div class="main-content">
    <div id="topbar-mount"></div>
    <div class="page fade-in" id="article-page">
      <div class="loading-screen"><div class="spinner-ring"></div></div>
    </div>
  </div>
</div>

<script src="/js/app.js"></script>
<script src="/js/sidebar.js"></script>
<script>
  renderSidebar('Article Details');

  const articleId = new URLSearchParams(window.location.search).get('id');
  if (!articleId) window.location.href = '/pages/articles.html';

  async function toggleFav(btn) {
    const isFav = btn.dataset.fav === '1';
    const r = isFav ? await api.delete(`/favorites/${articleId}`) : await api.post(`/favorites/${articleId}`);
    if (r.ok) {
      btn.dataset.fav   = isFav ? '0' : '1';
      btn.textContent   = isFav ? '☆ Add to Favorites' : '⭐ Favorited';
      btn.className     = isFav ? 'btn btn-secondary' : 'btn btn-warning';
      showToast(isFav ? 'Removed from favorites.' : 'Added to favorites.', 'success');
    }
  }

  async function deleteAndGo() {
    showConfirm('Delete Article', 'This will permanently delete the article and its PDF.', async () => {
      const r = await api.delete(`/articles/${articleId}`);
      if (r.ok) { showToast('Article deleted.', 'success'); setTimeout(() => window.location.href='/pages/articles.html', 800); }
      else showToast(getErrors(r.data), 'error');
    });
  }

  (async () => {
    await initLayout();
    const r = await api.get(`/articles/${articleId}`);
    const page = document.getElementById('article-page');

    if (!r.ok) {
      page.innerHTML = `<div class="empty-state"><div class="empty-icon">❌</div><h3>Article not found</h3><button class="btn btn-primary" onclick="history.back()">← Back</button></div>`;
      return;
    }

    const a = r.data.data;
    document.title = `${a.title} — Smart Article Organizer`;

    page.innerHTML = `
      <div class="page-header">
        <div style="display:flex;gap:10px;align-items:center">
          <button class="btn btn-secondary" onclick="history.back()">← Back</button>
          <button class="btn btn-secondary" onclick="window.location.href='/pages/article-form.html?id=${a.id}'">✏️ Edit</button>
          <button class="btn btn-danger"    onclick="deleteAndGo()">🗑️ Delete</button>
        </div>
        <div style="display:flex;gap:10px">
          ${a.pdf_filename
            ? `<a href="/api/articles/${a.id}/download" class="btn btn-success">⬇️ Download PDF</a>`
            : ''}
          <button class="btn ${a.is_favorite ? 'btn-warning' : 'btn-secondary'}"
                  data-fav="${a.is_favorite ? 1 : 0}"
                  id="fav-btn"
                  onclick="toggleFav(this)">
            ${a.is_favorite ? '⭐ Favorited' : '☆ Add to Favorites'}
          </button>
        </div>
      </div>

      <div class="article-detail-header">
        <div class="article-detail-title">${escHtml(a.title)}</div>

        <div class="article-detail-meta">
          ${a.authors           ? `<span class="article-detail-meta-item">👤 <strong>${escHtml(a.authors)}</strong></span>` : ''}
          ${a.publication_year  ? `<span class="article-detail-meta-item">📅 ${a.publication_year}</span>` : ''}
          ${a.journal_conference? `<span class="article-detail-meta-item">📰 ${escHtml(a.journal_conference)}</span>` : ''}
          ${a.doi               ? `<span class="article-detail-meta-item">🔗 DOI: <a href="https://doi.org/${escHtml(a.doi)}" target="_blank" style="color:var(--accent-light)">${escHtml(a.doi)}</a></span>` : ''}
          ${a.url               ? `<span class="article-detail-meta-item"><a href="${escHtml(a.url)}" target="_blank" style="color:var(--accent-light)">🌐 External Link</a></span>` : ''}
        </div>

        ${a.categories ? `<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">${categoryBadges(a.categories, a.category_colors)}</div>` : ''}
        ${a.keywords   ? `<div class="article-tags">${keywordTags(a.keywords)}</div>` : ''}
      </div>

      <div class="two-col" style="align-items:start">
        <div>
          ${a.abstract ? `
          <div class="detail-section">
            <h4>Abstract</h4>
            <p>${escHtml(a.abstract)}</p>
          </div>` : ''}

          ${a.notes ? `
          <div class="detail-section">
            <h4>Personal Notes</h4>
            <p style="white-space:pre-wrap">${escHtml(a.notes)}</p>
          </div>` : ''}

          ${!a.abstract && !a.notes ? `
          <div class="detail-section">
            <p style="color:var(--text-muted);font-size:14px">No abstract or notes added yet.
              <a href="/pages/article-form.html?id=${a.id}" style="color:var(--accent-light)">Add them now →</a>
            </p>
          </div>` : ''}
        </div>

        <div style="display:flex;flex-direction:column;gap:14px">
          <div class="card">
            <div class="card-header"><span class="card-title">📋 Metadata</span></div>
            <div class="card-body" style="padding:0 16px">
              <div class="detail-row"><div class="detail-key">Added</div>     <div class="detail-val">${formatDate(a.created_at)}</div></div>
              <div class="detail-row"><div class="detail-key">Updated</div>   <div class="detail-val">${formatDate(a.updated_at)}</div></div>
              <div class="detail-row"><div class="detail-key">PDF</div>
                <div class="detail-val">${a.pdf_filename
                  ? `<span class="has-pdf-badge">📎 ${escHtml(a.pdf_original_name||a.pdf_filename)}</span>`
                  + (a.pdf_size ? `<span style="font-size:12px;color:var(--text-muted);margin-left:6px">${formatBytes(a.pdf_size)}</span>` : '')
                  : '<span style="color:var(--text-muted)">None</span>'}</div></div>
              ${a.doi ? `<div class="detail-row"><div class="detail-key">DOI</div><div class="detail-val"><a href="https://doi.org/${escHtml(a.doi)}" target="_blank" style="color:var(--accent-light)">${escHtml(a.doi)}</a></div></div>` : ''}
              ${a.url ? `<div class="detail-row"><div class="detail-key">URL</div><div class="detail-val"><a href="${escHtml(a.url)}" target="_blank" style="color:var(--accent-light)">Open link ↗</a></div></div>` : ''}
            </div>
          </div>

          ${a.pdf_filename ? `
          <div class="card" style="background:rgba(16,185,129,0.06);border-color:rgba(16,185,129,0.25)">
            <div class="card-body" style="text-align:center;padding:24px">
              <div style="font-size:36px;margin-bottom:8px">📄</div>
              <div style="font-size:14px;font-weight:600;margin-bottom:4px">PDF Available</div>
              <div style="font-size:12px;color:var(--text-secondary);margin-bottom:14px">${escHtml(a.pdf_original_name||'')}${a.pdf_size?` · ${formatBytes(a.pdf_size)}`:''}</div>
              <a href="/api/articles/${a.id}/download" class="btn btn-success btn-full">⬇️ Download PDF</a>
            </div>
          </div>` : `
          <div class="card">
            <div class="card-body" style="text-align:center;padding:24px">
              <div style="font-size:32px;margin-bottom:8px;opacity:0.4">📎</div>
              <div style="font-size:13px;color:var(--text-secondary);margin-bottom:12px">No PDF attached</div>
              <button class="btn btn-secondary btn-full" onclick="window.location.href='/pages/article-form.html?id=${a.id}'">Upload PDF</button>
            </div>
          </div>`}

        </div>
      </div>`;
  })();
</script>
</body>
</html>
