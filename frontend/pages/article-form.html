<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Article — Smart Article Organizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="app-layout">
  <div id="sidebar-mount"></div>
  <div class="main-content">
    <div id="topbar-mount"></div>
    <div class="page fade-in">

      <div class="page-header">
        <div>
          <div class="page-title" id="form-page-title">Add Article</div>
          <div class="page-subtitle">Fill in the details of your research paper</div>
        </div>
        <div class="page-actions">
          <button class="btn btn-secondary" onclick="history.back()">← Back</button>
        </div>
      </div>

      <div class="two-col">
        <!-- Left: Main Details -->
        <div style="display:flex;flex-direction:column;gap:16px">

          <div class="card">
            <div class="card-header"><span class="card-title">📄 Basic Information</span></div>
            <div class="card-body">
              <div class="form-group">
                <label class="form-label">Title <span class="required">*</span></label>
                <input type="text" id="f-title" class="form-control" placeholder="Full title of the research paper" />
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label">Authors</label>
                  <input type="text" id="f-authors" class="form-control" placeholder="Smith, J.; Doe, A." />
                  <div class="form-hint">Separate multiple authors with semicolons</div>
                </div>
                <div class="form-group">
                  <label class="form-label">Publication Year</label>
                  <input type="number" id="f-year" class="form-control" placeholder="e.g. 2023" min="1800" max="2099" />
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">Journal / Conference</label>
                <input type="text" id="f-journal" class="form-control" placeholder="e.g. Nature, IEEE CVPR 2023" />
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label">DOI</label>
                  <input type="text" id="f-doi" class="form-control" placeholder="10.1000/xyz123" />
                </div>
                <div class="form-group">
                  <label class="form-label">URL</label>
                  <input type="url" id="f-url" class="form-control" placeholder="https://arxiv.org/…" />
                </div>
              </div>
            </div>
          </div>

          <div class="card">
            <div class="card-header"><span class="card-title">📝 Content</span></div>
            <div class="card-body">
              <div class="form-group">
                <label class="form-label">Abstract</label>
                <textarea id="f-abstract" class="form-control" rows="5" placeholder="Paste the paper's abstract here…"></textarea>
              </div>
              <div class="form-group">
                <label class="form-label">Personal Notes</label>
                <textarea id="f-notes" class="form-control" rows="4" placeholder="Your thoughts, summaries, or annotations…"></textarea>
              </div>
              <div class="form-group">
                <label class="form-label">Keywords</label>
                <div class="keyword-input-wrap" id="keywords-wrap">
                  <input type="text" id="keywords_input" placeholder="Type keyword and press Enter…" />
                </div>
                <input type="hidden" id="keywords" />
                <div class="form-hint">Press Enter, Tab, or comma after each keyword</div>
              </div>
            </div>
          </div>

        </div><!-- left col -->

        <!-- Right: PDF, Categories, Actions -->
        <div style="display:flex;flex-direction:column;gap:16px">

          <div class="card">
            <div class="card-header"><span class="card-title">📎 PDF Upload</span></div>
            <div class="card-body">
              <div class="upload-zone" id="upload-zone" onclick="document.getElementById('pdf-input').click()">
                <div class="upload-icon">📤</div>
                <p><strong>Click to upload</strong> or drag &amp; drop</p>
                <p style="margin-top:4px;font-size:12px">PDF only · Max 10 MB</p>
                <input type="file" id="pdf-input" accept="application/pdf" onchange="handleFileSelect(this)" />
              </div>
              <div id="file-info" class="hidden"></div>
              <div id="existing-pdf" class="hidden" style="margin-top:10px">
                <div class="upload-file-info">
                  <span class="file-icon">📄</span>
                  <span class="file-name" id="existing-pdf-name"></span>
                  <button class="remove-file" onclick="removePdf()" title="Remove PDF">×</button>
                </div>
              </div>
            </div>
          </div>

          <div class="card">
            <div class="card-header"><span class="card-title">🗂️ Categories</span></div>
            <div class="card-body">
              <div id="category-checkboxes" style="display:flex;flex-direction:column;gap:10px">
                <div class="loading-screen" style="min-height:80px"><div class="spinner-ring"></div></div>
              </div>
              <button class="btn btn-ghost btn-sm mt-3" onclick="window.open('/pages/categories.html','_blank')">
                + Manage Categories
              </button>
            </div>
          </div>

          <div class="card">
            <div class="card-body" style="display:flex;flex-direction:column;gap:10px">
              <div id="save-error" class="form-error hidden"></div>
              <button class="btn btn-primary btn-full btn-lg" id="save-btn" onclick="saveArticle()">
                💾 Save Article
              </button>
              <button class="btn btn-secondary btn-full" onclick="history.back()">Cancel</button>
            </div>
          </div>

        </div><!-- right col -->
      </div><!-- .two-col -->

    </div>
  </div>
</div>

<script src="/js/app.js"></script>
<script src="/js/sidebar.js"></script>
<script>
  renderSidebar('Article Form');

  const urlParams = new URLSearchParams(window.location.search);
  const editId    = urlParams.get('id');
  let removePdfFlag = false;
  let kwController;

  function handleFileSelect(input) {
    const file = input.files[0];
    if (!file) return;
    document.getElementById('file-info').innerHTML = `
      <div class="upload-file-info">
        <span class="file-icon">📄</span>
        <span class="file-name">${escHtml(file.name)} (${formatBytes(file.size)})</span>
        <button class="remove-file" onclick="clearFile()" title="Remove">×</button>
      </div>`;
    document.getElementById('file-info').classList.remove('hidden');
    document.getElementById('upload-zone').style.display = 'none';
  }

  function clearFile() {
    document.getElementById('pdf-input').value = '';
    document.getElementById('file-info').innerHTML = '';
    document.getElementById('file-info').classList.add('hidden');
    document.getElementById('upload-zone').style.display = '';
  }

  function removePdf() {
    removePdfFlag = true;
    document.getElementById('existing-pdf').classList.add('hidden');
    showToast('PDF will be removed when you save.', 'warning');
  }

  // Drag-and-drop
  const zone = document.getElementById('upload-zone');
  zone.addEventListener('dragover',  e => { e.preventDefault(); zone.classList.add('dragging'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('dragging'));
  zone.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('dragging');
    const file = e.dataTransfer.files[0];
    if (file && file.type === 'application/pdf') {
      const dt = new DataTransfer(); dt.items.add(file);
      document.getElementById('pdf-input').files = dt.files;
      handleFileSelect(document.getElementById('pdf-input'));
    } else {
      showToast('Only PDF files are allowed.', 'error');
    }
  });

  async function loadCategories(selectedIds = []) {
    const r = await api.get('/categories');
    const el = document.getElementById('category-checkboxes');
    if (!r.ok || !r.data.data.length) {
      el.innerHTML = `<p style="font-size:13px;color:var(--text-secondary)">No categories yet. <a href="/pages/categories.html" style="color:var(--accent-light)">Create one</a></p>`;
      return;
    }
    el.innerHTML = r.data.data.map(c => `
      <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:14px">
        <input type="checkbox" value="${c.id}" ${selectedIds.includes(String(c.id)) ? 'checked' : ''}
               style="width:16px;height:16px;accent-color:${c.color}" />
        <span class="cat-dot" style="background:${c.color};width:10px;height:10px;border-radius:50%;flex-shrink:0"></span>
        ${escHtml(c.name)}
        <span style="font-size:12px;color:var(--text-muted);margin-left:auto">${c.article_count} articles</span>
      </label>`).join('');
  }

  async function loadArticleForEdit(id) {
    const r = await api.get(`/articles/${id}`);
    if (!r.ok) { showToast('Article not found.', 'error'); history.back(); return; }

    const a = r.data.data;
    document.getElementById('form-page-title').textContent = 'Edit Article';
    document.title = 'Edit Article — Smart Article Organizer';

    document.getElementById('f-title').value    = a.title || '';
    document.getElementById('f-authors').value  = a.authors || '';
    document.getElementById('f-year').value     = a.publication_year || '';
    document.getElementById('f-journal').value  = a.journal_conference || '';
    document.getElementById('f-doi').value      = a.doi || '';
    document.getElementById('f-url').value      = a.url || '';
    document.getElementById('f-abstract').value = a.abstract || '';
    document.getElementById('f-notes').value    = a.notes || '';
    document.getElementById('keywords').value   = a.keywords || '';

    if (kwController) {
      kwController.setKeywords((a.keywords||'').split(',').map(k=>k.trim()).filter(Boolean));
    }

    if (a.pdf_filename) {
      document.getElementById('existing-pdf-name').textContent = a.pdf_original_name || a.pdf_filename;
      document.getElementById('existing-pdf').classList.remove('hidden');
    }

    const selectedIds = (a.category_ids || '').split(',').filter(Boolean);
    await loadCategories(selectedIds);
  }

  async function saveArticle() {
    const btn    = document.getElementById('save-btn');
    const errEl  = document.getElementById('save-error');
    const title  = document.getElementById('f-title').value.trim();

    if (!title) { showErr(errEl, 'Title is required.'); return; }

    const form = new FormData();
    form.append('title',              title);
    form.append('authors',            document.getElementById('f-authors').value.trim());
    form.append('publication_year',   document.getElementById('f-year').value.trim());
    form.append('journal_conference', document.getElementById('f-journal').value.trim());
    form.append('doi',                document.getElementById('f-doi').value.trim());
    form.append('url',                document.getElementById('f-url').value.trim());
    form.append('abstract',           document.getElementById('f-abstract').value.trim());
    form.append('notes',              document.getElementById('f-notes').value.trim());
    form.append('keywords',           document.getElementById('keywords').value);

    // Category IDs
    document.querySelectorAll('#category-checkboxes input[type=checkbox]:checked').forEach(cb => {
      form.append('category_ids', cb.value);
    });

    // PDF
    const pdfInput = document.getElementById('pdf-input');
    if (pdfInput.files[0]) form.append('pdf', pdfInput.files[0]);
    if (removePdfFlag) form.append('remove_pdf', 'true');

    setLoading(btn, true, 'Saving…');
    errEl.classList.add('hidden');

    const r = editId
      ? await api.uploadPut(`/articles/${editId}`, form)
      : await api.upload('/articles', form);

    setLoading(btn, false);

    if (r.ok) {
      showToast(editId ? 'Article updated!' : 'Article added!', 'success');
      const targetId = editId || r.data.id;
      setTimeout(() => window.location.href = `/pages/article-view.html?id=${targetId}`, 800);
    } else {
      showErr(errEl, getErrors(r.data));
    }
  }

  function showErr(el, msg) { el.textContent = msg; el.classList.remove('hidden'); }

  (async () => {
    await initLayout();
    kwController = initKeywordInput('keywords-wrap', 'keywords');
    if (editId) {
      await loadArticleForEdit(editId);
    } else {
      await loadCategories();
    }
  })();
</script>
</body>
</html>
